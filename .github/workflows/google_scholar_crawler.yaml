name: Get Citation Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Reqs
        run: sudo apt-get install python3-setuptools

      - name: Run Crawler
        timeout-minutes: 10
        run: |
          cd ./google_scholar_crawler
          pip3 install -r requirements.txt
          python3 main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

      - name: Copy Results and Commit
        run: |
          cp google_scholar_crawler/results/gs_data.json assets/
          cp google_scholar_crawler/results/gs_data_shieldsio.json assets/
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/gs_data.json assets/gs_data_shieldsio.json
          git diff --staged --quiet || (git commit -m "chore: update google scholar citation data" && git push)
